# Animation data for crystal golem
# Each animation defines keyframes with part rotations and joint positions

animations:
  idle:
    duration: 2.8
    loop: true
    keyframes:
      - time: 0.0
        parts: {}
      - time: 1.4
        parts:
          part_10:  # root - gentle bob
            rotation: -0.8
          part_09:  # upper body - slight lean
            rotation: 1.2
          part_11:  # head - subtle nod
            rotation: 1.5
          part_19:  # jaw - tiny movement
            rotation: 0.8
          part_23:  # pelvis - breathing
            rotation: 1.5
          part_01:  # left arm
            rotation: -0.8
          part_17:  # right arm
            rotation: 0.8
          part_15:  # left leg
            rotation: 0.2
          part_12:  # right leg
            rotation: -0.2
      - time: 2.8
        parts: {}

  walk:
    duration: 1.4
    loop: true
    keyframes:
      - time: 0.0
        parts:
          part_10:  # root - up position
            rotation: 0.5
          part_09:  # upper body - lean forward slightly
            rotation: 2
          part_11:  # head - counter balance
            rotation: -1.5
          part_19:  # jaw - open more
            rotation: 1.2
          part_23:  # pelvis - tilt
            rotation: -3
          part_15:  # left leg - back
            rotation: 12
          part_16:  # left foot
            rotation: -6
          part_12:  # right leg - forward
            rotation: -18
          part_13:  # right lower leg
            rotation: 8
          part_01:  # left arm - minimal swing
            rotation: -4
          part_02:  # left lower arm
            rotation: 2
          part_17:  # right arm - minimal swing
            rotation: 4
          part_03:  # right lower arm
            rotation: -2
      - time: 0.35
        parts:
          part_10:
            rotation: -0.5
          part_09:
            rotation: 1
          part_11:
            rotation: -0.5
          part_19:  # jaw - slightly closed
            rotation: 0.6
          part_23:
            rotation: 0
          part_15:
            rotation: -6
          part_16:
            rotation: 3
          part_12:
            rotation: -8
          part_13:
            rotation: 12
          part_01:
            rotation: -2
          part_02:
            rotation: 1
          part_17:
            rotation: 2
          part_03:
            rotation: -1
      - time: 0.7
        parts:
          part_10:
            rotation: 0.5
          part_09:
            rotation: 2
          part_11:
            rotation: -1.5
          part_19:  # jaw - open
            rotation: 1.2
          part_23:
            rotation: 3
          part_15:  # left leg - forward
            rotation: -18
          part_16:
            rotation: 8
          part_12:  # right leg - back
            rotation: 12
          part_13:
            rotation: -6
          part_01:  # left arm - minimal swing
            rotation: 4
          part_02:
            rotation: -2
          part_17:  # right arm - minimal swing
            rotation: -4
          part_03:
            rotation: 2
      - time: 1.05
        parts:
          part_10:
            rotation: -0.5
          part_09:
            rotation: 1
          part_11:
            rotation: -0.5
          part_19:  # jaw - slightly closed
            rotation: 0.6
          part_23:
            rotation: 0
          part_15:
            rotation: -8
          part_16:
            rotation: 12
          part_12:
            rotation: -6
          part_13:
            rotation: 3
          part_01:
            rotation: 2
          part_02:
            rotation: -1
          part_17:
            rotation: -2
          part_03:
            rotation: 1
      - time: 1.4
        parts:
          part_10:
            rotation: 0.5
          part_09:
            rotation: 2
          part_11:
            rotation: -1.5
          part_19:  # jaw - open
            rotation: 1.2
          part_23:
            rotation: -3
          part_15:
            rotation: 12
          part_16:
            rotation: -6
          part_12:
            rotation: -18
          part_13:
            rotation: 8
          part_01:
            rotation: -4
          part_02:
            rotation: 2
