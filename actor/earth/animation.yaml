# Animation data for earth golem

animations:
  idle:
    duration: 3.5
    loop: true
    keyframes:
      - time: 0.0
        parts: {}
      - time: 1.75
        parts:
          part_19:  # root - slow bob
            rotation: -0.8
          part_18:  # torso - breathing
            rotation: 1.5
          part_01:  # upper left side / head
            rotation: -1
          part_06:  # jaw - tiny movement
            rotation: 0.3
          part_14:  # upper right side
            rotation: 1
          part_07:  # left leg
            rotation: 0.6
          part_16:  # right leg
            rotation: -0.4
          part_03:  # left arm chain
            rotation: 0.5
          part_02:  # right arm
            rotation: -0.5
      - time: 3.5
        parts: {}

  walk:
    duration: 1.4
    loop: true
    keyframes:
      - time: 0.0
        parts:
          part_19:  # root - bob
            rotation: 1
          part_18:  # torso - counter sway
            rotation: -3
          part_01:  # head
            rotation: 1
          part_05:  # additional head/neck part
            rotation: 1.3
          part_06:  # jaw - tiny movement
            rotation: 0.4
          part_03:  # left leg chain - forward
            rotation: -16
          part_04:  # left lower leg
            rotation: 10
          part_07:  # right leg - back
            rotation: 14
          part_10:  # right lower leg
            rotation: -6
          part_14:  # right arm - swing forward
            rotation: -10
      - time: 0.7
        parts:
          part_19:
            rotation: 1
          part_18:
            rotation: 3
          part_01:
            rotation: -1
          part_05:
            rotation: -0.9
          part_06:
            rotation: 0.2
          part_03:  # left leg - back
            rotation: 14
          part_04:
            rotation: -6
          part_07:  # right leg - forward
            rotation: -16
          part_10:
            rotation: 10
          part_14:  # right arm - swing back
            rotation: 10
      - time: 1.4
        parts:
          part_19:
            rotation: 1
          part_18:
            rotation: -3
          part_01:
            rotation: 1
          part_05:
            rotation: 0.8
          part_06:
            rotation: 0.4
          part_03:
            rotation: -16
          part_04:
            rotation: 10
          part_07:
            rotation: 14
          part_10:
            rotation: -6
          part_14:
            rotation: -10
