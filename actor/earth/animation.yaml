# Animation data for earth golem

animations:
  idle:
    duration: 3.5
    loop: true
    keyframes:
      - time: 0.0
        parts: {}
      - time: 1.75
        parts:
          part_19:  # root - slow bob
            rotation: -0.8
          part_18:  # torso - breathing
            rotation: 1.5
          part_01:  # upper left side / head
            rotation: -1
          part_09:  # jaw - tiny movement
            rotation: 0.3
          part_14:  # upper right side
            rotation: 1
          part_07:  # left leg
            rotation: 0.6
          part_16:  # right leg
            rotation: -0.4
          part_03:  # left arm chain
            rotation: 0.5
          part_02:  # right arm
            rotation: -0.5
      - time: 3.5
        parts: {}

  walk:
    duration: 1.4
    loop: true
    keyframes:
      - time: 0.0
        parts:
          part_19:  # root - bob
            rotation: 1
          part_18:  # torso - counter sway
            rotation: -3
          part_01:  # head
            rotation: 1
          part_05:  # additional head/neck part
            rotation: 1.3
          part_09:  # jaw - tiny movement
            rotation: 0.4
          part_03:  # left leg chain - forward
            rotation: -16
          part_04:  # left lower leg
            rotation: 10
          part_07:  # right leg - back
            rotation: 14
          part_10:  # right lower leg
            rotation: -6
          part_14:  # right arm - swing forward
            rotation: -10
      - time: 0.7
        parts:
          part_19:
            rotation: 1
          part_18:
            rotation: 3
          part_01:
            rotation: -1
          part_05:
            rotation: -0.9
          part_06:
            rotation: 0.2
          part_03:  # left leg - back
            rotation: 14
          part_04:
            rotation: -6
          part_07:  # right leg - forward
            rotation: -16
          part_10:
            rotation: 10
          part_14:  # right arm - swing back
            rotation: 10
      - time: 1.4
        parts:
          part_19:
            rotation: 1
          part_18:
            rotation: -3
          part_01:
            rotation: 1
          part_05:
            rotation: 0.8
          part_06:
            rotation: 0.4
          part_03:
            rotation: -16
          part_04:
            rotation: 10
          part_07:
            rotation: 14
          part_10:
            rotation: -6
          part_14:
            rotation: -10

  talk:
    duration: 2.6
    loop: true
    keyframes:
      - time: 0.0
        parts:
          part_09:  # jaw - closed
            rotation: 0
          part_01:  # head - neutral
            rotation: 0
          part_05:  # neck part
            rotation: 0
      - time: 0.3
        parts:
          part_09:  # jaw - opening
            rotation: 22
          part_01:  # head - slight tilt
            rotation: -0.6
          part_05:  # neck - movement
            rotation: -0.8
          part_19:  # root - slow bob
            rotation: -0.5
          part_18:  # torso - breathing
            rotation: 1
          part_14:  # upper right side - subtle sway
            rotation: 0.7
          part_07:  # left leg
            rotation: 0.4
          part_16:  # right leg
            rotation: -0.3
          part_03:  # left arm
            rotation: 0.35
          part_02:  # right arm
            rotation: -0.3
      - time: 0.6
        parts:
          part_09:  # jaw - closing
            rotation: 9
          part_01:
            rotation: -0.3
          part_05:
            rotation: -0.4
          part_19:
            rotation: -0.6
          part_18:
            rotation: 1.2
          part_14:
            rotation: 0.9
          part_07:
            rotation: 0.45
          part_16:
            rotation: -0.35
          part_03:
