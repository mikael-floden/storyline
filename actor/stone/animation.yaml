# Animation data for stone golem

animations:
  idle:
    duration: 3.0
    loop: true
    keyframes:
      - time: 0.0
        parts: {}
      - time: 1.5
        parts:
          part_19:  # body/root - slight bob
            rotation: -1
          part_18:  # torso - breathing expand
            rotation: 2
          part_01:  # left arm
            rotation: -1
          part_06:  # right arm
            rotation: 1
          part_10:  # left leg - subtle weight shift
            rotation: 0.5
          part_12:  # right leg - subtle weight shift
            rotation: -0.5
      - time: 3.0
        parts: {}

  walk:
    duration: 1.6
    loop: true
    keyframes:
      - time: 0.0
        parts:
          part_18:  # torso - counter sway
            rotation: -3
          part_05:  # jaw - tiny movement
            rotation: 0.3
          part_10:  # left leg - forward
            rotation: -15
          part_17:  # left foot - lift and point
            rotation: 12
          part_12:  # right leg - back, planted
            rotation: 12
          part_13:  # right foot - flat on ground
            rotation: -8
          part_01:  # left arm - swing back
            rotation: 8
          part_06:  # right arm - swing forward
            rotation: -8
      - time: 0.4
        parts:
          part_18:
            rotation: 0
          part_05:
            rotation: 0.15
          part_10:  # left leg - passing through
            rotation: -5
          part_17:  # left foot - transitioning
            rotation: 2
          part_12:  # right leg - transitioning
            rotation: 0
          part_13:  # right foot - lifting
            rotation: 0
          part_01:
            rotation: 2
          part_06:
            rotation: -2
      - time: 0.8
        parts:
          part_18:
            rotation: 3
          part_05:
            rotation: 0.2
          part_10:  # left leg - back, planted
            rotation: 12
          part_17:  # left foot - flat on ground
            rotation: -8
          part_12:  # right leg - forward
            rotation: -15
          part_13:  # right foot - lift and point
            rotation: 12
          part_01:  # left arm - swing forward
            rotation: -8
          part_06:  # right arm - swing back
            rotation: 8
      - time: 1.2
        parts:
          part_18:
            rotation: 0
          part_05:
            rotation: 0.15
          part_10:  # left leg - transitioning
            rotation: 0
          part_17:  # left foot - lifting
            rotation: 0
          part_12:  # right leg - passing through
            rotation: -5
          part_13:  # right foot - transitioning
            rotation: 2
          part_01:
            rotation: -2
          part_06:
            rotation: 2
      - time: 1.6
        parts:
          part_18:
            rotation: -3
          part_05:
            rotation: 0.3
          part_10:
            rotation: -15
          part_17:
            rotation: 12
          part_12:
            rotation: 12
          part_13:
            rotation: -8
          part_01:
            rotation: 8
          part_06:
            rotation: -8
